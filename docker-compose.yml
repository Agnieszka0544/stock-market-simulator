services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped

  app2:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
